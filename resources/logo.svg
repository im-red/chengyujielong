<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0f0f0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGradient)"/>
  
  <!-- Chain link decoration (representing 接龙 - chain/link) -->
  <g opacity="0.3">
    <ellipse cx="180" cy="200" rx="40" ry="50" fill="none" stroke="#ffffff" stroke-width="12" transform="rotate(-20 180 200)"/>
    <ellipse cx="240" cy="200" rx="40" ry="50" fill="none" stroke="#ffffff" stroke-width="12" transform="rotate(-20 240 200)"/>
    <ellipse cx="300" cy="200" rx="40" ry="50" fill="none" stroke="#ffffff" stroke-width="12" transform="rotate(-20 300 200)"/>
  </g>
  
  <!-- Main text: 成语 -->
  <text x="256" y="240" font-family="'Noto Sans SC', 'Microsoft YaHei', sans-serif" font-size="120" font-weight="bold" fill="url(#textGradient)" text-anchor="middle">成语</text>
  
  <!-- Subtitle: 接龙 -->
  <text x="256" y="340" font-family="'Noto Sans SC', 'Microsoft YaHei', sans-serif" font-size="72" font-weight="600" fill="#ffffff" text-anchor="middle" opacity="0.95">接龙</text>
  
  <!-- Decorative dots -->
  <circle cx="140" cy="380" r="8" fill="#ffffff" opacity="0.6"/>
  <circle cx="180" cy="380" r="8" fill="#ffffff" opacity="0.6"/>
  <circle cx="332" cy="380" r="8" fill="#ffffff" opacity="0.6"/>
  <circle cx="372" cy="380" r="8" fill="#ffffff" opacity="0.6"/>
</svg>
