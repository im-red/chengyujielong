<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1024" height="1024" fill="url(#bgGradient)" rx="180"/>
  
  <!-- Chain link decoration -->
  <g opacity="0.25">
    <ellipse cx="360" cy="400" rx="80" ry="100" fill="none" stroke="#ffffff" stroke-width="24" transform="rotate(-20 360 400)"/>
    <ellipse cx="480" cy="400" rx="80" ry="100" fill="none" stroke="#ffffff" stroke-width="24" transform="rotate(-20 480 400)"/>
    <ellipse cx="600" cy="400" rx="80" ry="100" fill="none" stroke="#ffffff" stroke-width="24" transform="rotate(-20 600 400)"/>
  </g>
  
  <!-- Main text -->
  <text x="512" y="520" font-family="sans-serif" font-size="240" font-weight="bold" fill="#ffffff" text-anchor="middle" dominant-baseline="middle">成语</text>
  
  <!-- Subtitle -->
  <text x="512" y="700" font-family="sans-serif" font-size="144" font-weight="600" fill="#ffffff" text-anchor="middle" dominant-baseline="middle" opacity="0.95">接龙</text>
  
  <!-- Decorative dots -->
  <circle cx="280" cy="800" r="16" fill="#ffffff" opacity="0.6"/>
  <circle cx="360" cy="800" r="16" fill="#ffffff" opacity="0.6"/>
  <circle cx="664" cy="800" r="16" fill="#ffffff" opacity="0.6"/>
  <circle cx="744" cy="800" r="16" fill="#ffffff" opacity="0.6"/>
</svg>
